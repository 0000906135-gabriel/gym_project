{% extends 'base.html' %}

{% block content %}

<h1>👤 Alunos</h1>

<div class="card">
    <h2>➕ Novo Aluno</h2>

    <form method="post">
        {% csrf_token %}
        <input name="nome" placeholder="Nome" required><br><br>
        <input name="email" placeholder="Email" required><br><br>
        <input name="idade" placeholder="Idade" required><br><br>

        <button type="submit">Salvar</button>
    </form>
</div>

<div class="card">
    <h2>📋 Lista de Alunos</h2>

    {% for aluno in alunos %}
        <div class="tarefa">
            <strong>{{ aluno.nome }}</strong><br>
            {{ aluno.email }}<br>
            Idade: {{ aluno.idade }}<br><br>

            <a class="btn-edit" href="/editar-aluno/{{ aluno.id }}/">✏️ Editar</a> |
            <a class="btn-delete" href="/deletar-aluno/{{ aluno.id }}/"
               onclick="return confirm('Tem certeza que deseja deletar?')">
               ❌ Deletar
            </a>
        </div>
    {% empty %}
        <p>Nenhum aluno cadastrado</p>
    {% endfor %}
</div>

{% endblock %}
