<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Academia System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* 🔥 DEGRADÊ SUAVE */
            background: linear-gradient(135deg,
                #dc2626 0%,
                #b91c1c 25%,
                #7f1d1d 40%,
                #111 60%,
                #000 100%
            );

            min-height: 100vh;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        nav {
            text-align: center;
            margin-bottom: 30px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #facc15;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🔥 CARDS */
        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(117, 110, 110, 0.6); /* 🔥 cinza escuro */
             backdrop-filter: blur(10px);
             padding: 30px;
             border-radius: 15px;
             width: 220px;
             text-align: center;
             cursor: pointer;

             transition: 0.3s;
             border: 1px solid rgba(255,255,255,0.1);
        }

        /* ✨ HOVER */
        .card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        /* 💥 CLICK */
        .card:active {
            transform: scale(0.97);
        }

        /* 🎯 ÍCONES */
        h1, h2 {
            letter-spacing: 1px;
        }

        .card h2 {
            color: white; /* cinza mais escuro */
            transition: 0.3s;
        }

        .card:hover h2 {
            color: white; /* muda no hover */
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #facc15;
            color: black;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #fde047;
        }
    </style>
</head>
<body>

<header>
    💪 Sistema de Academia
</header>

<nav>
    <a href="/">Home</a>
    <a href="/alunos/">Alunos</a>
    <a href="/exercicios/">Exercícios</a>
    <a href="/treinos/">Treinos</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
